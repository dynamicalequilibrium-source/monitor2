name: Daily Support Project Scraper

on:
  schedule:
    # Run twice a day at off-peak times: 22:30 UTC (07:30 AM KST) and 10:30 UTC (07:30 PM KST)
    - cron: '30 22,10 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        # Disable GITHUB_TOKEN env to run in local SQLite/CSV mode.
        # This will write changes directly to data/support_projects.csv.
        env:
          GITHUB_TOKEN: ""
          GITHUB_REPOSITORY: ""
        run: |
          python main.py --now

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/support_projects.csv
          # Only commit and push if there are actual new changes to the CSV
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Support projects ($(date +'%Y-%m-%d %H:%M'))" && git push)
